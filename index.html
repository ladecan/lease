<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리스 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e0ddd5;
    --text: #1a1a1a;
    --text-muted: #999;
    --text-dim: #ccc;
    --accent: #3d6b2f;
    --red: #d94f4f;
    --yellow: #c47f00;
    --blue: #2d6fa3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    background: var(--surface);
  }

  .header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header-left .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .stat-row { display: flex; gap: 20px; align-items: center; }
  .stat { text-align: right; }
  .stat-num { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; line-height: 1; }
  .stat-num.accent { color: var(--accent); }
  .stat-num.muted { color: var(--text-muted); }
  .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .stat-divider { width: 1px; height: 28px; background: var(--border); }

  .tabs {
    display: flex;
    padding: 0 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 11px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .toolbar {
    padding: 12px 36px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 280px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px 7px 30px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }

  .spacer { flex: 1; }

  .btn-add {
    padding: 7px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }

  .table-wrap { overflow-x: auto; padding: 20px 36px; }

  table { width: 100%; border-collapse: collapse; min-width: 860px; }

  thead tr { border-bottom: 2px solid var(--border); }

  th {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.7px;
    text-transform: uppercase;
    padding: 0 10px 10px;
    text-align: center;
    white-space: nowrap;
    line-height: 1.6;
  }
  th.left { text-align: left; }
  th:first-child { padding-left: 0; width: 36px; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: rgba(0,0,0,0.02); }

  td {
    padding: 10px 10px;
    font-size: 13px;
    vertical-align: middle;
    text-align: center;
  }
  td.left { text-align: left; }
  td:first-child { padding-left: 0; }

  .hospital-name { font-weight: 500; color: var(--text); }
  .manager-name { font-size: 12px; color: var(--text-muted); }

  .notes-text {
    font-size: 12px;
    color: var(--text-muted);
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 3-state button group */
  .cell-btn-group { display: flex; gap: 3px; justify-content: center; }

  .cell-btn {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    color: var(--text-muted);
    font-weight: 600;
    line-height: 1;
  }
  .cell-btn:hover { border-color: #999; color: var(--text); }
  .cell-btn.ax { background: rgba(217,79,79,0.1); border-color: var(--red); color: var(--red); }
  .cell-btn.av { background: rgba(196,127,0,0.1); border-color: var(--yellow); color: var(--yellow); }
  .cell-btn.ao { background: rgba(61,107,47,0.12); border-color: var(--accent); color: var(--accent); }

  /* 2-state toggle */
  .tog {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    color: var(--text-dim);
    font-weight: 600;
  }
  .tog:hover { border-color: var(--accent); }
  .tog.on { background: rgba(61,107,47,0.12); border-color: var(--accent); color: var(--accent); }

  .row-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .actions { display: flex; gap: 3px; justify-content: center; }
  .btn-icon {
    width: 26px; height: 26px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.12s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--red); color: var(--red); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
    animation: pop 0.15s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 5px; }
  .form-group input, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel { padding: 7px 14px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); border-radius: 6px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .btn-save { padding: 7px 18px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .btn-save:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>리스 관리</h1>
    <div class="sub" id="updated-at">—</div>
  </div>
  <div class="stat-row">
    <div class="stat">
      <div class="stat-num accent" id="stat-active">—</div>
      <div class="stat-label">진행중</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num muted" id="stat-done">—</div>
      <div class="stat-label">완료</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num muted" id="stat-total">—</div>
      <div class="stat-label">전체</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="active" onclick="switchTab('active')">진행중</div>
  <div class="tab" data-tab="done" onclick="switchTab('done')">완료</div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="병원명, 담당자 검색…">
  </div>
  <div class="spacer"></div>
  <button class="btn-add" onclick="openModal()">＋ 추가</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th></th>
        <th class="left">병원명</th>
        <th class="left">담당자</th>
        <th>발주수락서<br><span style="font-size:9px;font-weight:400;opacity:0.7;letter-spacing:0">✕없음 &nbsp;✔필요 &nbsp;○전송</span></th>
        <th>계약서</th>
        <th>세금계산서</th>
        <th>입금</th>
        <th>반환<br><span style="font-size:9px;font-weight:400;opacity:0.7;letter-spacing:0">✕없음 &nbsp;!필요 &nbsp;○완료</span></th>
        <th class="left">메모</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">항목이 없습니다.</div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <h2 id="modal-title">새 항목 추가</h2>
    <div class="form-group">
      <label>병원명</label>
      <input type="text" id="f-hospital" placeholder="병원명">
    </div>
    <div class="form-group">
      <label>담당자</label>
      <input type="text" id="f-manager" placeholder="리스회사 담당자">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="f-notes" placeholder="추가 메모"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'candela-lease-v2';

// order: 'none'(필요없음) | 'need'(필요함) | 'sent'(전송완료)
// return: 'none'(필요없음) | 'need'(반환필요) | 'done'(반환완료)
// 완료 조건: return === 'none' || return === 'done'

let data = [];
let editingId = null;
let currentTab = 'active';

function isDone(d) { return d.ret === 'none' || d.ret === 'done'; }

function newItem(hospital, manager, notes) {
  return {
    id: Date.now() + '_' + Math.floor(Math.random()*10000),
    hospital, manager, notes,
    order: 'need',
    contract: false,
    tax: false,
    payment: false,
    ret: 'need',
  };
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  data = raw ? JSON.parse(raw) : [];
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function render() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  const filtered = data.filter(d => {
    if (currentTab === 'active' && isDone(d)) return false;
    if (currentTab === 'done' && !isDone(d)) return false;
    if (query && !d.hospital.toLowerCase().includes(query) && !d.manager.toLowerCase().includes(query)) return false;
    return true;
  });

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = filtered.map((d, i) => `
      <tr>
        <td><span class="row-num">${i+1}</span></td>
        <td class="left"><div class="hospital-name">${esc(d.hospital)}</div></td>
        <td class="left"><div class="manager-name">${esc(d.manager)}</div></td>
        <td>
          <div class="cell-btn-group">
            <button class="cell-btn ${d.order==='none'?'ax':''}" onclick="setField('${d.id}','order','none')" title="필요없음">✕</button>
            <button class="cell-btn ${d.order==='need'?'av':''}" onclick="setField('${d.id}','order','need')" title="필요함">✔</button>
            <button class="cell-btn ${d.order==='sent'?'ao':''}" onclick="setField('${d.id}','order','sent')" title="전송완료">○</button>
          </div>
        </td>
        <td>
          <button class="tog ${d.contract?'on':''}" onclick="toggleBool('${d.id}','contract')">${d.contract?'○':'✕'}</button>
        </td>
        <td>
          <button class="tog ${d.tax?'on':''}" onclick="toggleBool('${d.id}','tax')">${d.tax?'○':'✕'}</button>
        </td>
        <td>
          <button class="tog ${d.payment?'on':''}" onclick="toggleBool('${d.id}','payment')">${d.payment?'○':'✕'}</button>
        </td>
        <td>
          <div class="cell-btn-group">
            <button class="cell-btn ${d.ret==='none'?'ao':''}" onclick="setRet('${d.id}','none')" title="필요없음">✕</button>
            <button class="cell-btn ${d.ret==='need'?'av':''}" onclick="setRet('${d.id}','need')" title="반환필요">!</button>
            <button class="cell-btn ${d.ret==='done'?'ao':''}" onclick="setRet('${d.id}','done')" title="반환완료">○</button>
          </div>
        </td>
        <td><div class="notes-text" title="${esc(d.notes)}">${esc(d.notes)||'<span style="color:var(--text-dim)">—</span>'}</div></td>
        <td>
          <div class="actions">
            <button class="btn-icon" onclick="editItem('${d.id}')" title="수정">✎</button>
            <button class="btn-icon del" onclick="deleteItem('${d.id}')" title="삭제">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  const active = data.filter(d => !isDone(d)).length;
  const done = data.filter(d => isDone(d)).length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-total').textContent = data.length;

  const now = new Date();
  document.getElementById('updated-at').textContent =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function find(id) { return data.find(x => x.id === id); }

function setField(id, field, val) {
  const d = find(id);
  if (d) { d[field] = val; save(); render(); }
}

function toggleBool(id, field) {
  const d = find(id);
  if (d) { d[field] = !d[field]; save(); render(); }
}

function setRet(id, val) {
  const d = find(id);
  if (!d) return;
  d.ret = val;
  save();
  const nowDone = isDone(d);
  if (nowDone && currentTab === 'active') {
    render();
    setTimeout(() => switchTab('done'), 250);
  } else if (!nowDone && currentTab === 'done') {
    render();
    setTimeout(() => switchTab('active'), 250);
  } else {
    render();
  }
}

function deleteItem(id) {
  if (!confirm('삭제할까요?')) return;
  data = data.filter(x => x.id !== id);
  save(); render();
}

function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? '수정' : '새 항목 추가';
  const d = id ? find(id) : null;
  document.getElementById('f-hospital').value = d ? d.hospital : '';
  document.getElementById('f-manager').value = d ? d.manager : '';
  document.getElementById('f-notes').value = d ? d.notes : '';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-hospital').focus(), 50);
}

function editItem(id) { openModal(id); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalBg(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

function saveItem() {
  const hospital = document.getElementById('f-hospital').value.trim();
  const manager = document.getElementById('f-manager').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  if (!hospital) { document.getElementById('f-hospital').focus(); return; }
  if (editingId) {
    Object.assign(find(editingId), { hospital, manager, notes });
  } else {
    data.push(newItem(hospital, manager, notes));
  }
  save(); render(); closeModal();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  render();
}

document.getElementById('search').addEventListener('input', render);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
});

load();
render();
</script>
</body>
</html>
